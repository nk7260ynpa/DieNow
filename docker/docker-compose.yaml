services:
  app:
    image: ring-of-hands:local
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    environment:
      PYTHONPATH: /app/src
    volumes:
      - ../logs:/app/logs
      # 將主機 ~/.claude 掛入容器, 使容器內 `claude -p ...` 能承繼 Max 訂閱
      # OAuth session. 目前以 read-write 掛載, 避免 CLI 刷新 token 時
      # 寫入失敗; 若日後確認 session 檔完全 immutable, 可改為 :ro.
      - ${HOME}/.claude:/home/app/.claude
    working_dir: /app
    # 預設指令透過 run.sh 透傳; compose 本身不指定 command, 以 Dockerfile 的 CMD 為準.
